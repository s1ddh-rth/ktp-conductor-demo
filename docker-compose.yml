# Local-test compose for the KTP conductor demo.
#
# The Dockerfile bakes a CUDA 12.4 runtime, so a host with NVIDIA
# drivers >= 535 and the nvidia-container-toolkit installed will
# pick up the GPU automatically. CPU-only hosts still get a working
# (slower) fallback because `ConductorSegmenter` falls back to CPU
# when CUDA is unavailable.
#
# Usage:
#   docker compose up --build         # foreground, with logs
#   docker compose up -d              # background
#   docker compose logs -f            # tail logs
#   docker compose down               # stop and remove
#
# To use a weights file from the host instead of baking it into the
# image, comment out the COPY of weights/ in the Dockerfile and
# rely on the bind mount below.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ktp-conductor-demo:latest
    container_name: ktp-demo
    restart: unless-stopped
    ports:
      # Host port 8002 matches the operator's Cloudflare tunnel
      # config (scripts/cloudflared-config.example.yml: service:
      # http://localhost:8002). Container port stays at 8000 — that
      # is what uvicorn binds inside the container.
      - "8002:8000"
    volumes:
      # `:Z` is harmless on Docker (label is ignored) and required on
      # Fedora / RHEL hosts running rootless Podman with SELinux
      # enforcing — without it, the container gets EACCES on the
      # bind-mounted directories.
      - ./weights:/app/weights:ro,Z
      - ./app/static/examples:/app/app/static/examples:ro,Z
    environment:
      - DEVICE=cuda          # falls back to cpu if CUDA is unavailable
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
